<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Elberadweg Day Planner</title>
    <!-- Leaflet's CSS is imported from the npm package in src/map.js (which owns
         all Leaflet specifics); app styles live in src/style.css via src/main.js. -->
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='88'>🚲</text></svg>"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="map"></div>
    <aside id="panel">
      <header id="panel-header">
        <h1>Elberadweg Day Planner</h1>
        <p>Hamburg → Dresden · plan your ride one day at a time</p>
      </header>
      <div id="banner" class="banner" hidden></div>
      <div id="controls"></div>
      <div id="towns"></div>
      <div id="pois"></div>
      <div id="itinerary"></div>
      <footer id="panel-footer">
        Route &amp; town data © OpenStreetMap contributors (ODbL) · right-bank
        Elberadweg · ~650 km
      </footer>
    </aside>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
